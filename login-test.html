<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; cursor: pointer; }
        button:hover { background: #5568d3; }
        .result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #333; color: #fff; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔐 Login Test</h1>
    
    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" value="kssp@gmail.com" />
    </div>
    
    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" value="password" />
    </div>
    
    <button onclick="runTests()">Run Tests</button>
    
    <div id="results"></div>

    <script>
        async function runTests() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<p>Running tests...</p>';
            
            const results = [];
            
            // Test 1: Get CSRF Cookie
            try {
                console.log('Test 1: Getting CSRF cookie...');
                await fetch('http://127.0.0.1:8000/sanctum/csrf-cookie', {
                    credentials: 'include'
                });
                results.push({ test: 'CSRF Cookie', status: 'success', message: 'Cookie set' });
                console.log('CSRF Cookie set successfully');
            } catch (error) {
                results.push({ test: 'CSRF Cookie', status: 'error', message: error.message });
                console.error('CSRF Cookie error:', error);
            }
            
            // Get CSRF token from cookie
            const csrfToken = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1];
            console.log('CSRF Token:', csrfToken);
            
            // Test 2: Login
            try {
                console.log('Test 2: Attempting login...');
                const response = await fetch('http://127.0.0.1:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRF-TOKEN': decodeURIComponent(csrfToken || ''),
                        'Accept': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Login response:', response.status, data);
                
                if (response.ok) {
                    results.push({ test: 'Login', status: 'success', message: 'Login successful!', data });
                } else {
                    results.push({ test: 'Login', status: 'error', message: data.message || 'Login failed', data });
                }
            } catch (error) {
                results.push({ test: 'Login', status: 'error', message: error.message });
                console.error('Login error:', error);
            }
            
            // Display results
            let html = '';
            results.forEach(result => {
                const color = result.status === 'success' ? 'green' : 'red';
                html += `<div class="result" style="border-left: 4px solid ${color}">`;
                html += `<strong>${result.test}:</strong> `;
                html += `<span style="color: ${color}">${result.message}</span>`;
                if (result.data) {
                    html += `<pre>${JSON.stringify(result.data, null, 2)}</pre>`;
                }
                html += `</div>`;
            });
            
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
